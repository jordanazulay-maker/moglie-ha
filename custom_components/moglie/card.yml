type: custom:button-card
entity: binary_sensor.be25_wan_status
show_icon: false
show_name: false
show_state: false
tap_action:
  action: navigate
  navigation_path: |
    [[[ 
      return `/history?entity_id=${entity.entity_id}` 
    ]]]
custom_fields:
  content: |
    [[[
      const img = "https://raw.githubusercontent.com/jordanazulay-maker/moglie-ha/refs/heads/main/monkey.png";
      const alarmState = states['alarm_control_panel.alarm_control_panel']?.state;
      let message = "";
      let style = "";

      if (entity.state === 'off') {
        // WAN is down
        message = "Moglie is stranded.<br>He can't find the<br>rest of the pack!";
        style = "color: #e74c3c; font-weight: bold;";
      } else if (alarmState === 'armed_away') {
        // Armed Away
        message = "The rest of the primates have started<br>their patrol, I'll watch the trees<br>until someone comes back.";
      } else {
        // Armed Home or Disarmed
        message = "Welcome Home!<br>We've checked all the trees,<br>no surprises here.<br>Please tell me you<br>brought us more bananas!";
      }

      return `
        <div class="text" style="${style}">
          ${message}
        </div>
        <div class="img">
          <img src="${img}">
        </div>
      `;
    ]]]
styles:
  card:
    - padding: 16px
    - border-radius: 16px
    - text-align: center
    - cursor: pointer
    - transition: all 0.2s ease
  custom_fields:
    content:
      - display: flex
      - flex-direction: column
      - align-items: center
      - justify-content: center
  grid:
    - grid-template-areas: "\"content\""
extra_styles: |
  .text {
    line-height: 1.4;
    margin-bottom: 12px;
  }
  .img img {
    width: 100px;
  }
  ha-card:hover {
    background: rgba(var(--rgb-primary-text-color), 0.05);
  }
